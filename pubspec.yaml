name: salah_tracker
description: A modern Salah tracking app — track your 5 daily prayers and see your progress with offline-first support and cloud sync.
publish_to: 'none'
version: 1.1.0+3

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.2.0

  # Local database
  sqflite: ^2.3.2
  path: ^1.9.0

  # Supabase
  supabase_flutter: ^2.4.0

  # Charts
  fl_chart: ^1.2.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Fonts & styling
  google_fonts: ^8.0.2

  # Google Auth
  google_sign_in: ^7.2.0

  # Date formatting
  intl: ^0.20.2

  # Shared preferences (settings)
  shared_preferences: ^2.2.3

  # Path provider
  path_provider: ^2.1.3

  # Localization
  easy_localization: ^3.0.7
  url_launcher: ^6.3.2
  package_info_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.3
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0F0D"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/translations/
