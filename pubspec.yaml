name: salah_tracker
description: A modern Salah tracking app — track your 5 daily prayers with offline-first support and cloud sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.2.0

  # Local database
  sqflite: ^2.3.2
  path: ^1.9.0

  # Supabase
  supabase_flutter: ^2.4.0

  # Charts
  fl_chart: ^1.2.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Fonts & styling
  google_fonts: ^8.0.2

  # Google Auth
  google_sign_in: ^7.2.0

  # Date formatting
  intl: ^0.20.2

  # Shared preferences (settings)
  shared_preferences: ^2.2.3

  # Path provider
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
